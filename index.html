<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>xh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #05050f;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        header h1 { font-size: 28px; color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; letter-spacing: 2px; margin-bottom: 8px; }
        header p { font-size: 13px; color: #8888aa; }
        .game-grid { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        .game-card { background: rgba(15, 15, 35, 0.85); border: 2px solid #333355; border-radius: 16px; padding: 16px; display: flex; align-items: center; text-decoration: none; color: #fff; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .game-card:active, .game-card:hover { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); transform: translateY(-2px); }
        .game-icon { font-size: 40px; width: 65px; height: 65px; background: #111125; border: 1px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 16px; flex-shrink: 0; }
        .game-info { flex-grow: 1; }
        .game-title { font-size: 18px; font-weight: bold; color: #ff0055; margin-bottom: 4px; text-shadow: 0 0 5px rgba(255, 0, 85, 0.2); }
        .game-desc { font-size: 12px; color: #aaa; line-height: 1.4; }
        .game-arrow { font-size: 20px; color: #00ffcc; margin-left: 10px; }
        .game-card.loading { opacity: 0.5; border-style: dashed; cursor: not-allowed; }
        .game-card.loading .game-title { color: #888; }
    </style>
</head>
<body>
    <header>
        <h1>这是什么</h1>
        <p>xh</p>
    </header>
    <div class="game-grid">
        <a href="https://5201314xh.github.io/first-game/" class="game-card">
            <div class="game-icon">🚀</div>
            <div class="game-info">
                <div class="game-title">打飞机/div>
                <div class="game-desc">简单版</div>
            </div>
            <div class="game-arrow">➔</div>
        </a>
        <div class="game-card loading">
            <div class="game-icon">👽</div>
            <div class="game-info">
                <div class="game-title">前方区域还未开放</div>
                <div class="game-desc">11111</div>
            </div>
        </div>
    </div>
</body>
</html>
